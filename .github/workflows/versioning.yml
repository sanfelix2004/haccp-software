name: Auto Versioning

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest

    if: "!contains(github.event.head_commit.message, 'chore: bump version')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Git config
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Bump version
        run: |
          VERSION=$(cat VERSION)

          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          if [ "$MAJOR" -ne 1 ]; then
            echo "Only MAJOR 1 allowed"
            exit 1
          fi

          PATCH=$((PATCH + 1))

          if [ "$PATCH" -gt 10 ]; then
            PATCH=0
            MINOR=$((MINOR + 1))
          fi

          if [ "$MINOR" -gt 30 ]; then
            echo "Max version reached: 1.30.10"
            exit 1
          fi

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"

          echo "$NEW_VERSION" > VERSION
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: Commit version
        run: |
          git add VERSION
          git commit -m "chore: bump version to $NEW_VERSION" || echo "No changes to commit"
          git push

      - name: Tag version
        run: |
          git tag "v$NEW_VERSION" || echo "Tag already exists"
          git push origin "v$NEW_VERSION" || echo "Tag already pushed"
